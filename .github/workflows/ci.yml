# GitHub Actions equivalent of the IaC validation gates — kept alongside the
# Azure Pipelines definition to demonstrate fluency with both CI systems.
name: terraform-ci

on:
  push:
    branches: [main]
    paths: ["terraform/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["terraform/**"]

permissions:
  contents: read

jobs:
  validate:
    name: fmt · validate · tflint · tfsec
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: terraform/environments/${{ matrix.env }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform/environments/${{ matrix.env }}
        run: terraform validate

      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --chdir=terraform/environments/${{ matrix.env }} --init && tflint --chdir=terraform/environments/${{ matrix.env }}

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          soft_fail: true
          working_directory: terraform
